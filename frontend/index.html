<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
    }

    /* 🔥 FONDO DOBLE */
    .background {
      position: fixed;
      inset: 0;
      display: flex;
      z-index: -1;
    }

    .bg-left,
    .bg-right {
      width: 50%;
      background-size: cover;
      background-position: center;
      filter: brightness(0.4);
    }

    .bg-left {
      background-image: url("assets/img/bg1.jpg");
    }

    .bg-right {
      background-image: url("assets/img/bg2.jpg");
    }

    /* OVERLAY OSCURO */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.85);
      z-index: -1;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 140px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 10px;
    }

    .btn-main {
      margin-top: 25px;
      padding: 10px 25px;
      border-radius: 0;
      border: 1px solid #3b82f6;
      color: #3b82f6;
      background: transparent;
      transition: 0.2s;
    }

    .btn-main:hover {
      background: #3b82f6;
      color: white;
    }

    .btn-secondary {
      margin-top: 25px;
      padding: 10px 25px;
      border-radius: 0;
      border: 1px solid #64748b;
      color: #64748b;
      background: transparent;
      transition: 0.2s;
    }

    .btn-secondary:hover {
      background: #64748b;
      color: white;
    }

    footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #64748b;
      padding: 15px;
    }

    @media (max-width: 768px) {
      .bg-right {
        display: none;
      }
      .bg-left {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- FONDOS -->
  <div class="background">
    <div class="bg-left"></div>
    <div class="bg-right"></div>
  </div>

  <div class="overlay"></div>

  <!-- CONTENIDO -->
  <div class="hero">

    <img src="assets/img/SHOPARELOGO.jpg" class="logo">

    <h1>VELVET</h1>
    <p class="subtitle">Tu tienda en línea moderna, rápida y elegante.</p>

    <div>
      <a href="login.html" class="btn btn-main">Iniciar sesión</a>
      <a href="register.html" class="btn btn-secondary ms-2">Registrarme</a>
    </div>

  </div>

  <footer>
    © 2025 Velvet — Todos los derechos reservados
  </footer>

</body>
</html>
