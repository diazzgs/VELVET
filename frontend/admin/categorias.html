<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar categorías</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: url('../assets/img/bg2.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      position: relative;
      margin: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.50),
        rgba(0, 0, 0, 0.68)
      );
      z-index: -1;
    }

    .categorias-container {
      padding-top: 34px;
      padding-bottom: 60px;
    }

    .categorias-header {
      margin-bottom: 34px;
      padding: 22px 24px;
      border-radius: 22px;
      background: rgba(12, 12, 12, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    .categorias-titulo {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #ffffff;
      font-family: 'Georgia', 'Times New Roman', serif;
      letter-spacing: 0.5px;
    }

    .categorias-subtitulo {
      font-size: 0.98rem;
      color: rgba(255, 255, 255, 0.78);
      margin: 0;
    }

    .btn-categoria {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.75);
      color: #ffffff;
      border-radius: 999px;
      padding: 11px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.20);
    }

    .btn-categoria:hover {
      background: #ffffff;
      color: #111111;
      transform: translateY(-2px);
    }

    .table-modern,
    .table-modern tbody,
    .table-modern tr,
    .table-modern td {
      display: block;
      width: 100%;
      border: none;
    }

    .table-modern {
      margin: 0;
      background: transparent;
    }

    #lista-categorias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 26px;
    }

    .table-modern tbody tr {
      border-radius: 22px;
      overflow: hidden;
      background: rgba(20, 20, 20, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      transition: transform 0.28s ease, box-shadow 0.28s ease, border 0.28s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .table-modern tbody tr:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .table-modern tbody td:first-child {
      height: 215px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
    }

    .table-modern tbody td:first-child::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.12)
      );
    }

    .table-modern tbody td:last-child {
      background: rgba(14, 14, 14, 0.88);
      padding: 18px 18px 20px;
      color: #f4f4f4;
    }

    .categoria-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .categoria-nombre {
      font-size: 1.18rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      font-family: 'Georgia', 'Times New Roman', serif;
      letter-spacing: 0.2px;
    }

    .categoria-texto {
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.72);
      margin: 0;
      line-height: 1.5;
    }

    .btn-eliminar {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.75);
      color: #ffffff;
      font-size: 0.84rem;
      font-weight: 600;
      padding: 7px 14px;
      width: fit-content;
      border-radius: 999px;
      transition: all 0.3s ease;
      margin-top: 4px;
    }

    .btn-eliminar:hover {
      background: #ffffff;
      color: #111111;
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .categorias-container {
        padding-top: 24px;
      }

      .categorias-header {
        padding: 18px 18px;
      }

      .categorias-titulo {
        font-size: 2rem;
      }

      .table-modern tbody td:first-child {
        height: 200px;
      }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container mt-4 categorias-container">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 categorias-header">
      <div>
        <h2 class="categorias-titulo">Categorías</h2>
        <p class="categorias-subtitulo">Organización visual de las categorías registradas</p>
      </div>

      <button class="btn btn-categoria" onclick="AdminCategorias.mostrarFormulario()">
        + Nueva categoría
      </button>
    </div>

    <table class="table-modern">
      <tbody id="lista-categorias"></tbody>
    </table>

  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/adminCategorias.js"></script>

  <script>
    Auth.requireAuth(["admin"]);
    AdminCategorias.cargarCategorias();
  </script>

</body>
</html>
