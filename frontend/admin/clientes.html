<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Gestión de clientes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      background: url('../assets/img/fondo-vogue.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      z-index: -1;
    }

    .wrap {
      max-width: 1320px;
      margin: 18px auto 60px;
    }

    .panel {
      background: rgba(10, 10, 10, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .list {
      max-height: 72vh;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .item {
      padding: 12px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .item:hover { background: rgba(255,255,255,0.04); }
    .item.active { background: rgba(59,130,246,0.18); }

    .muted { color: #cbd5e1; }
  </style>
</head>

<body>
  <div id="navbar-container"></div>

  <div class="container-fluid wrap">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mt-4 mb-3">
      <div>
        <h2 class="m-0" style="font-weight:800;">Gestión de clientes</h2>
        <div class="small muted">Ver clientes activos, pedidos y mensajería directa.</div>
      </div>
      <small id="clientesStatus" class="muted"></small>
    </div>

    <div class="row g-3">
      <div class="col-12 col-lg-4">
        <div class="panel">
          <div class="d-flex gap-2 mb-2">
            <input id="clientesSearch" class="form-control" placeholder="Buscar cliente..."
                   style="background:#0b1220;color:#fff;border:1px solid rgba(255,255,255,0.12);border-radius:0;">
          </div>
          <div id="clientesList" class="list"></div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="panel">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
            <div class="fw-bold" id="clienteTitle">Selecciona un cliente</div>
            <div class="d-flex gap-2">
              <button id="btnMensaje" class="btn btn-success btn-sm" style="border-radius:0;display:none;">Enviar mensaje</button>
              <button id="btnEliminar" class="btn btn-danger btn-sm" style="border-radius:0;display:none;">Borrar cliente</button>
            </div>
          </div>

          <div id="clienteInfo" class="muted small mb-3"></div>

          <div class="fw-bold mb-2">Pedidos</div>
          <div id="clientePedidos" class="muted">Selecciona un cliente para ver sus pedidos.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/adminClientes.js"></script>

  <script>
    Auth.requireAuth(["admin"]);
    AdminClientes.init();
  </script>
</body>
</html>
