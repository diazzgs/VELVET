<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Productos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(10,10,10,0.65), rgba(10,10,10,0.75)),
        url("../assets/img/fondo-vogue.jpg") center/cover no-repeat fixed;
      color: #fff;
    }

    .admin-page {
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .page-header {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .page-title {
      color: #fff;
      margin: 0;
    }

    .btn-new-product {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 10px;
      padding: 10px 15px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .btn-new-product:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    .table-panel {
      margin-top: 20px;
      background: rgba(0,0,0,0.45);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(10px);
      overflow-x: auto;
    }

    .table-modern {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
      background: transparent !important;
      color: #fff;
    }

    .table,
    .table-striped,
    .table tbody tr,
    .table-striped tbody tr:nth-of-type(odd),
    .table-striped tbody tr:nth-of-type(even) {
      background: transparent !important;
    }

    .table-modern thead {
      background: transparent;
    }

    .table-modern thead th {
      background: rgba(255,255,255,0.08) !important;
      backdrop-filter: blur(6px);
      color: #fff;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 600;
      white-space: nowrap;
    }

    .table-modern tbody tr {
      background: rgba(0,0,0,0.4) !important;
      transition: 0.2s ease;
    }

    .table-modern tbody tr:nth-child(even) {
      background: rgba(255,255,255,0.02) !important;
    }

    .table-modern tbody tr:hover {
      background: rgba(255,255,255,0.08) !important;
    }

    .table-modern tbody td {
      background: transparent !important;
      color: #f1f1f1;
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle;
    }

    .table-modern img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
    }

    .btn-warning {
      background: rgba(255, 193, 7, 0.15);
      color: #ffd65a;
      border: 1px solid rgba(255, 193, 7, 0.3);
      font-size: 0.85rem;
    }

    .btn-warning:hover {
      background: rgba(255, 193, 7, 0.25);
      color: #fff3bf;
    }

    .btn-danger {
      background: rgba(255, 77, 109, 0.15);
      color: #ff6b86;
      border: 1px solid rgba(255, 77, 109, 0.3);
      font-size: 0.85rem;
    }

    .btn-danger:hover {
      background: rgba(255, 77, 109, 0.25);
      color: #ffd0d8;
    }

    .acciones-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      color: rgba(255,255,255,0.8);
      padding: 25px 10px;
    }
  </style>
</head>

<body>
  <div class="admin-page">
    <div id="navbar-container"></div>

    <div class="container mt-4">
      <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold page-title">Administrar productos</h2>
        <a href="producto-form.html" class="btn-new-product">+ Nuevo producto</a>
      </div>

      <div class="table-panel">
        <table class="table-modern">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaProductos">
            <tr>
              <td colspan="6" class="empty-state">Cargando productos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/admin.js"></script>

  <script>
    Auth.requireAuth(["admin"]);
    Admin.loadProductos();
  </script>
</body>
</html>
