<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Admin Pedidos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      background: url('../assets/img/fondo-vogue.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Poppins', sans-serif;
      position: relative;
      color: #fff;
    }

    /* overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    .pedidos-wrapper {
      max-width: 1200px;
      margin: 30px auto;
      background: rgba(10, 10, 10, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(8px);
    }

    .pedidos-header {
      display: flex;
      justify-content: center;
      padding: 30px;
      background: rgba(0,0,0,0.4);
      border-radius: 18px;
      backdrop-filter: blur(8px);
    }

    .pedidos-title {
      font-size: 3.5rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      margin: 0;
    }

    #admin-pedidos-container {
      background: rgba(0,0,0,0.3);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(6px);
    }

    /* 🔥 TARJETAS OSCURAS (SOLUCION AL PROBLEMA) */
    .pedido-card,
    .card {
      background: rgba(15, 15, 15, 0.65) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
      color: #fff;
    }

    .pedido-numero {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    /* TEXTO */
    .pedido-card p,
    .pedido-card strong,
    .pedido-card label,
    .card p,
    .card strong,
    .card label {
      color: #fff !important;
    }

    /* LISTAS */
    .pedido-card ul {
      color: #ddd;
    }

    /* SELECT */
    .pedido-card select,
    .form-select {
      background: rgba(0,0,0,0.6) !important;
      color: #fff !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
    }

    /* HOVER */
    .pedido-card:hover {
      transform: translateY(-3px);
      background: rgba(20,20,20,0.75);
      transition: 0.3s;
    }

    .pedido-vacio {
      text-align: center;
      color: #ccc;
      padding: 20px;
    }

    @media (max-width: 768px) {
      .pedidos-title {
        font-size: 2.2rem;
      }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container-fluid">
    <div class="pedidos-wrapper">

      <div class="pedidos-header">
        <h2 class="pedidos-title">Gestión de pedidos</h2>
      </div>

      <div id="admin-pedidos-container">
        <p class="pedido-vacio">Cargando pedidos...</p>
      </div>

    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/admin.js?v=3"></script>

  <script>
    Auth.requireAuth(["admin"]);
    Admin.loadPedidosAdmin();
  </script>

</body>
</html>
