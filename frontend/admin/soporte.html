<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoparé - Soporte (Admin)</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      background: url('../assets/img/fondo-vogue.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      z-index: -1;
    }

    .wrap {
      max-width: 1280px;
      margin: 18px auto 60px;
    }

    .panel {
      background: rgba(10, 10, 10, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .list {
      max-height: 70vh;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .item {
      padding: 12px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .item:hover { background: rgba(255,255,255,0.04); }
    .item.active { background: rgba(59,130,246,0.18); }

    .chat {
      min-height: 62vh;
      max-height: 70vh;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.10);
      padding: 12px;
      background: rgba(0,0,0,0.22);
    }

    .msg { display: flex; margin: 10px 0; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: min(760px, 94%);
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
    }
    .msg.me .bubble {
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.30);
    }
    .meta { font-size: 11px; color: #cbd5e1; margin-top: 6px; }
  </style>
</head>

<body>
  <div id="navbar-container"></div>

  <div class="container-fluid wrap">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mt-4 mb-3">
      <div>
        <h2 class="m-0" style="font-weight:800;">Soporte</h2>
        <div class="small" style="color:#cbd5e1;">Conversaciones abiertas de clientes.</div>
      </div>
      <small id="adminSoporteStatus" style="color:#cbd5e1;"></small>
    </div>

    <div class="row g-3">
      <div class="col-12 col-lg-4">
        <div class="panel">
          <div class="fw-bold mb-2">Conversaciones</div>
          <div id="convList" class="list"></div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="panel">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
            <div class="fw-bold" id="convTitle">Selecciona una conversación</div>
            <button id="btnCerrarConv" class="btn btn-sm btn-outline-light" style="border-radius:0;display:none;">Cerrar conversación</button>
          </div>

          <div id="adminChat" class="chat"></div>

          <form id="adminChatForm" class="mt-3 d-flex gap-2">
            <input id="adminChatInput" class="form-control"
                   placeholder="Responder..."
                   style="background:#0b1220;color:#fff;border:1px solid rgba(255,255,255,0.12);border-radius:0;">
            <button class="btn btn-success" type="submit" style="border-radius:0;min-width:120px;">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/soporte.js"></script>

  <script>
    Auth.requireAuth(["admin"]);
    SoporteAdmin.init();
  </script>
</body>
</html>
