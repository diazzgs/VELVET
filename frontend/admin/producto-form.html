<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Producto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f2f2f2;
      font-family: 'Montserrat', sans-serif;
      color: #222;
    }

    .product-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LADO IZQUIERDO */
    .product-preview-side {
      position: relative;
      background: linear-gradient(to bottom, #f5f5f5, #e9e9e9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      overflow: hidden;
    }

    .product-preview-side::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .preview-text {
      position: absolute;
      top: 48px;
      left: 42px;
      max-width: 290px;
      z-index: 2;
    }

    .preview-text small {
      display: block;
      font-size: 0.72rem;
      color: #666;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .preview-text h2 {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      line-height: 1.05;
      font-weight: 500;
      color: #2b2b2b;
      text-transform: uppercase;
    }

    .preview-dots {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      align-items: center;
    }

    .preview-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #b5b5b5;
      display: inline-block;
    }

    .preview-dots span.active {
      background: #555;
    }

    .preview-image-box {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .preview-image {
      max-width: 320px;
      max-height: 480px;
      object-fit: contain;
      filter: drop-shadow(0 18px 20px rgba(0,0,0,0.18));
      display: none;
    }

    .preview-placeholder {
      width: 280px;
      height: 400px;
      border: 1px dashed rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.35);
    }

    /* LADO DERECHO */
    .product-form-side {
      background: #f8f8f8;
      padding: 48px 52px;
      display: flex;
      align-items: center;
    }

    .form-wrapper {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #555;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      color: #000;
    }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: #222;
    }

    .form-subtitle {
      color: #6e6e6e;
      font-size: 0.92rem;
      margin-bottom: 26px;
    }

    .product-form {
      border-top: 1px solid #ddd;
      padding-top: 24px;
    }

    .form-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-control,
    .form-select,
    textarea.form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid #c9c9c9;
      border-radius: 0;
      color: #222;
      box-shadow: none !important;
      padding-left: 0;
      padding-right: 0;
      padding-top: 10px;
      padding-bottom: 12px;
      font-size: 0.96rem;
    }

    .form-control:focus,
    .form-select:focus,
    textarea.form-control:focus {
      background: transparent;
      border-bottom: 1px solid #111;
      color: #111;
    }

    .form-control::placeholder,
    textarea.form-control::placeholder {
      color: #999;
    }

    textarea.form-control {
      resize: none;
    }

    .form-select option {
      color: #000;
    }

    .file-box {
      border: 1px solid #d8d8d8;
      padding: 12px 14px;
      background: #fcfcfc;
    }

    .file-input-custom {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    .file-input-custom::file-selector-button {
      background: #1f1f1f;
      color: #fff;
      border: none;
      padding: 10px 14px;
      margin-right: 12px;
      font-size: 0.8rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .file-input-custom::-webkit-file-upload-button {
      background: #1f1f1f;
      color: #fff;
      border: none;
      padding: 10px 14px;
      margin-right: 12px;
      font-size: 0.8rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-save {
      width: 100%;
      margin-top: 24px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: 14px;
      font-size: 0.83rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      transition: 0.3s ease;
    }

    .btn-save:hover {
      background: #333;
      color: #fff;
    }

    @media (max-width: 991px) {
      .product-page {
        grid-template-columns: 1fr;
      }

      .product-preview-side {
        min-height: 460px;
      }

      .product-form-side {
        padding: 36px 24px;
      }

      .preview-text {
        top: 28px;
        left: 24px;
      }

      .preview-text h2 {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 576px) {
      .preview-image {
        max-width: 220px;
        max-height: 320px;
      }

      .preview-placeholder {
        width: 220px;
        height: 300px;
      }

      .form-title {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="product-page">
    <div class="product-preview-side">
      <div class="preview-text">
        <small>Producto</small>
        <h2 id="previewNombre">
          Nuevo producto
        </h2>

        <div class="preview-dots">
          <span class="active"></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="preview-image-box">
        <img id="previewImagen" class="preview-image" alt="Vista previa del producto">
        <div id="previewPlaceholder" class="preview-placeholder">
          Aquí aparecerá la imagen del producto
        </div>
      </div>
    </div>

    <div class="product-form-side">
      <div class="form-wrapper">
        <a href="productos.html" class="back-link">‹ Volver a la lista</a>

        <h2 id="tituloForm" class="form-title">Nuevo producto</h2>
        <p class="form-subtitle">Completa los datos del producto manteniendo la funcionalidad actual.</p>

        <form id="productoForm" class="product-form mt-3">
          <input type="hidden" id="productoId">

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea id="descripcion" class="form-control" rows="2"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Marca</label>
            <input type="text" id="marca" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" id="precio" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" id="stock" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select id="categoriaSelect" class="form-select">
              <option value="">Cargando categorías...</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Imagen</label>
            <div class="file-box">
              <input type="file" id="imagen" class="form-control file-input-custom" accept="image/*">
            </div>
          </div>

          <button type="submit" class="btn btn-save">Guardar producto</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/adminProductos.js"></script>

  <script>
    Auth.requireAuth(["admin"]);

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const nombreInput = document.getElementById("nombre");
    const imagenInput = document.getElementById("imagen");
    const previewNombre = document.getElementById("previewNombre");
    const previewImagen = document.getElementById("previewImagen");
    const previewPlaceholder = document.getElementById("previewPlaceholder");

    nombreInput.addEventListener("input", () => {
      const nombre = nombreInput.value.trim();
      previewNombre.textContent = nombre || "Nuevo producto";
    });

    imagenInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        previewImagen.src = event.target.result;
        previewImagen.style.display = "block";
        previewPlaceholder.style.display = "none";
      };
      reader.readAsDataURL(file);
    });

    if (id) {
      document.getElementById("tituloForm").textContent = "Editar producto";

      AdminProductos.loadCategoriasSelect().then(() => {
        AdminProductos.editProducto(id);

        setTimeout(() => {
          const nombreActual = document.getElementById("nombre").value.trim();
          if (nombreActual) {
            previewNombre.textContent = nombreActual;
          }
        }, 400);
      });
    } else {
      AdminProductos.loadCategoriasSelect();
    }
  </script>

</body>
</html>
