<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Shoparé</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
        linear-gradient(rgba(5, 10, 15, 0.75), rgba(5, 10, 15, 0.85)),
        url("../assets/img/fondo-perfil.jpg") center center / cover no-repeat fixed;
      color: #fff;
    }

    .perfil-wrapper {
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 15px;
    }

    .profile-card {
      width: 100%;
      max-width: 420px;
      border-radius: 30px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.7);
      margin-top: 15px;
      margin-bottom: 15px;
    }

    .profile-name {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .profile-role {
      color: rgba(255,255,255,0.8);
      margin-bottom: 15px;
    }

    .tag {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      margin: 4px;
      font-size: 0.8rem;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding: 15px 0;
      text-align: center;
    }

    .stats div {
      flex: 1;
    }

    .stats span {
      display: block;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 5px;
    }

    .stats strong {
      display: block;
      font-size: 1.05rem;
      font-weight: bold;
      color: #fff;
      word-break: break-word;
    }

    .info p {
      margin: 5px 0;
      font-size: 0.9rem;
    }

    .btn-main {
      width: 100%;
      padding: 15px;
      border-radius: 30px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-main:hover {
      background: rgba(255,255,255,0.35);
    }

  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="perfil-wrapper">

    <div class="profile-card text-center">

      <img src="../assets/img/default.png" class="avatar" alt="Usuario">

      <h3 id="nombreUsuario" class="profile-name"></h3>
      <p class="profile-role">Cliente de Velvet</p>

      <div>
        <span class="tag">Velvet</span>
        <span class="tag">Cliente</span>
      </div>

      <!-- 🔥 AQUÍ ESTÁ EL CAMBIO -->
      <div class="stats">
        <div>
          <span>Correo</span>
          <strong id="correoMini"></strong>
        </div>
        <div>
          <span>Teléfono</span>
          <strong id="telMini"></strong>
        </div>
        <div>
          <span>Estado</span>
          <strong>Activo</strong>
        </div>
      </div>

      <div class="info">
        <p><strong>Correo:</strong> <span id="correoUsuario"></span></p>
        <p><strong>Teléfono:</strong> <span id="telUsuario"></span></p>
        <p><strong>Dirección:</strong> <span id="dirUsuario"></span></p>
      </div>

      <a href="pedidos.html" class="btn-main">Ver mis pedidos</a>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>

  <script>
    Auth.requireAuth(["cliente"]);
    const user = Auth.currentUser();

    const nombre = user?.nombre || "Usuario";
    const correo = user?.email || "No definido";
    const telefono = user?.telefono || "No definido";
    const direccion = user?.direccion || "No definida";

    document.getElementById("nombreUsuario").innerText = nombre;
    document.getElementById("correoUsuario").innerText = correo;
    document.getElementById("telUsuario").innerText = telefono;
    document.getElementById("dirUsuario").innerText = direccion;

    document.getElementById("correoMini").innerText =
      correo.length > 12 ? correo.substring(0, 12) + "..." : correo;

    document.getElementById("telMini").innerText = telefono;
  </script>

</body>
</html>
