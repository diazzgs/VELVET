<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Productos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      background: url('../assets/img/fondo-vogue3.png') no-repeat center center fixed;
      background-size: cover;
      color: #ffffff;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.55);
      z-index: -1;
    }

    .container {
      max-width: 1400px;
    }

    #productos-container {
      padding-top: 20px;
      padding-bottom: 30px;
    }

    /* CARD ESTILO CATÁLOGO */
    .product-card,
    .card {
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      overflow: hidden;
      transition: transform 0.25s ease;
    }

    .product-card:hover,
    .card:hover {
      transform: translateY(-4px);
    }

    /* ZONA DE IMAGEN */
    .product-img-wrapper {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .product-img,
    .card-img-top {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .product-card:hover .product-img,
    .card:hover .card-img-top,
    .card:hover .product-img {
      transform: scale(1.03);
    }

    /* CUERPO */
    .product-info,
    .card-body {
      padding: 0 !important;
      background: transparent !important;
    }

    /* NOMBRE DEL PRODUCTO */
    .product-title,
    .card-title,
    h5,
    h4 {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff !important;
      margin: 8px 0 6px 0;
      text-transform: none;
      letter-spacing: 0.2px;
    }

    /* TEXTO GENERAL */
    .product-info p,
    .product-info span,
    .product-info small,
    .card-text,
    .card-body p,
    .card-body span,
    .card-body small {
      color: #e5e7eb !important;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .product-info strong,
    .card-body strong {
      color: #ffffff !important;
      font-weight: 700;
    }

    /* PRECIO */
    .product-price {
      color: #f8fafc !important;
      font-size: 13px;
      font-weight: 500;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    /* INFO ABAJO TIPO CATÁLOGO */
    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      font-size: 11px;
      color: #d1d5db;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .product-meta span {
      color: #d1d5db !important;
      font-size: 11px;
    }

    /* BOTÓN MÁS LIMPIO */
    .btn-cart,
    .btn {
      margin-top: 8px;
      background: transparent;
      color: #ffffff;
      border: none;
      border-radius: 0;
      padding: 0;
      font-size: 12px;
      font-weight: 500;
      text-align: left;
      box-shadow: none !important;
    }

    .btn-cart:hover,
    .btn:hover {
      color: #93c5fd;
      background: transparent;
      text-decoration: underline;
    }

    /* ELIMINAR FONDOS BLANCOS */
    .bg-white,
    .text-dark,
    .text-muted,
    .text-secondary {
      background: transparent !important;
    }

    select {
      background: #1f2937;
      color: white;
      border: 1px solid #374151;
    }

    ::selection {
      background: #3b82f6;
      color: #ffffff;
    }

    ::-moz-selection {
      background: #3b82f6;
      color: #ffffff;
    }

    @media (max-width: 768px) {
      .product-title,
      .card-title,
      h5,
      h4 {
        font-size: 14px;
      }

      .product-info p,
      .product-info span,
      .product-info small,
      .card-text,
      .card-body p,
      .card-body span,
      .card-body small {
        font-size: 12px;
      }
    }

    @media (min-width: 1400px) {
      .col-xl-3 {
        width: 25%;
      }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container mt-4">
    <div class="row g-2 align-items-end mb-3">
      <div class="col-12 col-lg-6">
        <label for="searchInput" class="form-label small text-uppercase" style="letter-spacing:1.2px;color:#cbd5e1;">Buscar</label>
        <input id="searchInput" type="search" class="form-control"
               placeholder="Busca por nombre, marca o descripción..."
               style="background:#0b1220;color:#fff;border:1px solid rgba(255,255,255,0.12);border-radius:0;">
      </div>

      <div class="col-6 col-lg-3">
        <label for="categoriaFilter" class="form-label small text-uppercase" style="letter-spacing:1.2px;color:#cbd5e1;">Categoría</label>
        <select id="categoriaFilter" class="form-select" style="border-radius:0;">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="col-6 col-lg-3">
        <label for="sortSelect" class="form-label small text-uppercase" style="letter-spacing:1.2px;color:#cbd5e1;">Ordenar</label>
        <select id="sortSelect" class="form-select" style="border-radius:0;">
          <option value="relevance">Relevancia</option>
          <option value="price_asc">Precio: menor a mayor</option>
          <option value="price_desc">Precio: mayor a menor</option>
          <option value="name_asc">Nombre: A → Z</option>
          <option value="name_desc">Nombre: Z → A</option>
        </select>
      </div>

      <div class="col-12 d-flex justify-content-between align-items-center mt-1">
        <small id="resultsLabel" style="color:#cbd5e1;"></small>
        <button id="clearFiltersBtn" type="button" class="btn btn-sm"
                style="border:1px solid rgba(255,255,255,0.15);padding:8px 12px;border-radius:0;">
          Limpiar filtros
        </button>
      </div>
    </div>

    <div id="productos-container" class="row g-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/cliente.js"></script>

  <script>
    Auth.requireAuth(["cliente"]);
    Cliente.loadProductosCliente();
  </script>

</body>
</html>
