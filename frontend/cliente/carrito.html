<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Carrito</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      background: #aaaab0;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .carrito-page {
      padding: 30px 0 50px;
    }

    .carrito-title {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .carrito-layout {
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      gap: 50px;
      align-items: start;
    }

    .productos-header {
      font-size: 1.5rem;
      font-weight: 500;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    #carrito-container {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Estilo esperado para los items que renderiza JS */
    #carrito-container > * {
      border-top: 1px solid rgba(0,0,0,0.18);
      padding: 22px 0;
      background: transparent !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    #carrito-container > *:first-child {
      border-top: none;
      padding-top: 0;
    }

    #carrito-container .card,
    #carrito-container .carrito-item,
    #carrito-container .producto-card,
    #carrito-container .item-carrito {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Intenta reorganizar internamente lo que venga desde JS */
    #carrito-container img {
      width: 170px;
      height: 210px;
      object-fit: cover;
      background: #e7e7e3;
      display: block;
    }

    #carrito-container .row {
      align-items: start;
    }

    #carrito-container .btn {
      border-radius: 0;
    }

    #carrito-container select,
    #carrito-container input[type="number"],
    #carrito-container input[type="text"],
    #carrito-container .form-control,
    #carrito-container .form-select {
      border: none;
      border-bottom: 1px solid #111;
      border-radius: 0;
      background: transparent;
      box-shadow: none !important;
      padding-left: 0;
      padding-right: 0;
      color: #111;
    }

    #carrito-container .text-muted {
      color: #555 !important;
    }

    .summary-card {
      position: sticky;
      top: 20px;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }

    .summary-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .summary-divider {
      border-top: 1px solid rgba(0,0,0,0.25);
      margin: 14px 0 18px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      font-size: 1rem;
      text-transform: uppercase;
    }

    .summary-label {
      color: #111;
    }

    .summary-value {
      color: #111;
      font-weight: 500;
      text-align: right;
    }

    .summary-muted {
      color: #666;
    }

    .summary-section label {
      font-size: 0.95rem;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .summary-section .form-select {
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.25);
      border-radius: 0;
      background-color: transparent;
      padding-left: 0;
      box-shadow: none;
      text-transform: uppercase;
    }

    .summary-section .form-check {
      padding-left: 1.8rem;
    }

    .summary-section .form-check-input {
      border-radius: 0;
      border-color: #111;
      box-shadow: none !important;
    }

    .summary-section .form-check-label {
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .checkout-btn {
      width: 100%;
      background: transparent;
      color: #111;
      border: none;
      border-top: 1px solid rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(0,0,0,0.25);
      border-radius: 0;
      padding: 16px 0;
      margin-top: 18px;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s ease;
    }

    .checkout-btn:hover {
      background: #111;
      color: #fff;
    }

    .carrito-footer-links {
      margin-top: 35px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.18);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .carrito-link {
      color: #111;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.95rem;
      font-weight: 500;
      border-bottom: 1px solid #111;
      padding-bottom: 2px;
      transition: 0.3s ease;
    }

    .carrito-link:hover {
      color: #000;
      opacity: 0.7;
    }

    @media (max-width: 991.98px) {
      .carrito-layout {
        grid-template-columns: 1fr;
        gap: 35px;
      }

      .summary-card {
        position: static;
      }

      .carrito-title {
        font-size: 3rem;
      }

      .summary-title {
        font-size: 2.4rem;
      }
    }

    @media (max-width: 575.98px) {
      .carrito-page {
        padding: 20px 0 40px;
      }

      .carrito-title {
        font-size: 2.3rem;
      }

      .productos-header {
        font-size: 1.1rem;
      }

      .summary-title {
        font-size: 2rem;
      }

      #carrito-container img {
        width: 120px;
        height: 150px;
      }

      .carrito-footer-links {
        flex-direction: column;
        align-items: flex-start;
      }

      .checkout-btn {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container carrito-page">
    <h2 class="carrito-title">Cart</h2>

    <div class="carrito-layout">
      <div class="carrito-products-area">
        <h3 class="productos-header">Products</h3>

        <div id="carrito-container"></div>

        <div class="carrito-footer-links">
          <a href="productos.html" class="carrito-link">&lt; Seguir comprando</a>
          <a href="productos.html" class="carrito-link">Agregar más productos &gt;</a>
        </div>
      </div>

      <div class="summary-card">
        <h3 class="summary-title">Summary</h3>
        <div class="summary-divider"></div>

        <div class="summary-row">
          <span class="summary-label">Total</span>
          <span class="summary-value" id="carrito-total">L 0.00</span>
        </div>

        <div class="summary-row">
          <span class="summary-label">Entrega</span>
          <span class="summary-value summary-muted">Según pedido</span>
        </div>

        <div class="summary-divider"></div>

        <div class="summary-section">
          <label for="metodoPago">Método de pago</label>
          <select id="metodoPago" class="form-select">
            <option value="efectivo">Efectivo</option>
            <option value="transferencia">Transferencia</option>
          </select>

          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" id="pagoEnvio">
            <label class="form-check-label" for="pagoEnvio">
              Deseo pagar el envío
            </label>
          </div>

          <button class="checkout-btn" onclick="Cliente.realizarPedido()">
            <span>Confirmar pedido</span>
            <span id="checkout-total">L 0.00</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/cliente.js"></script>

  <script>
    Auth.requireAuth(["cliente"]);
    Cliente.loadCarrito();

    const totalEl = document.getElementById("carrito-total");
    const checkoutTotalEl = document.getElementById("checkout-total");

    const syncCheckoutTotal = () => {
      if (totalEl && checkoutTotalEl) {
        checkoutTotalEl.textContent = totalEl.textContent;
      }
    };

    const observer = new MutationObserver(syncCheckoutTotal);

    if (totalEl) {
      observer.observe(totalEl, {
        childList: true,
        subtree: true,
        characterData: true
      });
      syncCheckoutTotal();
    }
  </script>

</body>
</html>
