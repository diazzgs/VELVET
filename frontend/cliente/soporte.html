<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoparé - Soporte</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      background: url('../assets/img/fondo-vogue3.png') no-repeat center center fixed;
      background-size: cover;
      color: #ffffff;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.58);
      z-index: -1;
    }

    .chat-wrap {
      max-width: 980px;
      margin: 18px auto 60px;
    }

    .chat-box {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 14px;
      min-height: 55vh;
      max-height: 65vh;
      overflow: auto;
    }

    .msg {
      display: flex;
      margin: 10px 0;
    }

    .msg.me { justify-content: flex-end; }

    .bubble {
      max-width: min(680px, 92%);
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
    }

    .msg.me .bubble {
      background: rgba(59,130,246,0.22);
      border-color: rgba(59,130,246,0.35);
    }

    .meta {
      font-size: 11px;
      color: #cbd5e1;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div id="navbar-container"></div>

  <div class="container chat-wrap">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mt-4 mb-2">
      <div>
        <h2 class="m-0" style="font-weight:750;">Soporte</h2>
        <div class="small" style="color:#cbd5e1;">Escríbenos y un administrador te responderá.</div>
      </div>
      <small id="soporteStatus" style="color:#cbd5e1;"></small>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <form id="chatForm" class="mt-3 d-flex gap-2">
      <input id="chatInput" class="form-control"
             placeholder="Escribe tu mensaje..."
             style="background:#0b1220;color:#fff;border:1px solid rgba(255,255,255,0.12);border-radius:0;">
      <button class="btn btn-primary" type="submit" style="border-radius:0;min-width:120px;">Enviar</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/soporte.js"></script>

  <script>
    Auth.requireAuth(["cliente"]);
    SoporteCliente.init();
  </script>
</body>
</html>
