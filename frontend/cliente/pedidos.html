<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Mis pedidos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      background:
        linear-gradient(rgba(20, 20, 20, 0.72), rgba(20, 20, 20, 0.72)),
        url("../assets/img/fondo-pedidos.png") center center / cover no-repeat fixed;
      min-height: 100vh;
    }

    .mis-pedidos-wrapper {
      padding: 30px 0 50px;
    }

    .mis-pedidos-title {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 30px;
      text-transform: uppercase;
      color: #ffffff;
    }

    .pedido-layout {
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      margin-bottom: 30px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .pedido-left {
      padding-right: 25px;
      border-right: 1px solid #cfcfcf;
    }

    .pedido-right {
      padding-left: 25px;
    }

    .section-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: #111;
    }

    .subsection-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 24px;
      margin-bottom: 30px;
    }

    .info-item {
      border-bottom: 1px solid #cfcfcf;
      padding-bottom: 8px;
    }

    .info-label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .info-value {
      font-size: 0.95rem;
      color: #111;
      font-weight: 500;
      word-break: break-word;
    }

    .estado-badge {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .estado-pendiente,
    .estado-en-proceso {
      background: #fff3cd;
      color: #8a6500;
      border: 1px solid #f1d98b;
    }

    .estado-enviado {
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
    }

    .estado-entregado {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .estado-cancelado {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .estado-default {
      background: #e5e7eb;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .resumen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .resumen-count {
      font-size: 0.95rem;
      color: #666;
      font-weight: 500;
    }

    .producto-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #ddd;
      align-items: start;
    }

    .producto-img {
      width: 80px;
      height: 95px;
      background: #efefef;
      border: 1px solid #ddd;
      border-radius: 4px;
      object-fit: cover;
    }

    .producto-placeholder {
      width: 80px;
      height: 95px;
      background: #efefef;
      border: 1px solid #ddd;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 0.8rem;
      text-align: center;
      padding: 8px;
    }

    .producto-nombre {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #111;
    }

    .producto-meta {
      font-size: 0.87rem;
      color: #555;
      line-height: 1.6;
      margin: 0;
    }

    .producto-precio {
      font-size: 0.95rem;
      font-weight: 700;
      color: #111;
      white-space: nowrap;
    }

    .totales {
      margin-top: 22px;
      border-top: 1px solid #ddd;
      padding-top: 18px;
    }

    .total-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #333;
    }

    .total-final {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
    }

    .empty-box,
    .error-box,
    .loading-box {
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 18px;
      padding: 30px;
      font-size: 1rem;
      color: #111;
    }

    @media (max-width: 991px) {
      .pedido-left {
        border-right: none;
        padding-right: 12px;
        margin-bottom: 25px;
      }

      .pedido-right {
        padding-left: 12px;
      }
    }

    @media (max-width: 767px) {
      body {
        background:
          linear-gradient(rgba(20, 20, 20, 0.78), rgba(20, 20, 20, 0.78)),
          url("../assets/img/fondo-pedidos.png") center center / cover no-repeat fixed;
      }

      .mis-pedidos-title {
        font-size: 2.2rem;
      }

      .pedido-layout {
        padding: 18px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .producto-item {
        grid-template-columns: 70px 1fr;
      }

      .producto-precio {
        grid-column: 2 / 3;
        margin-top: 8px;
      }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container mis-pedidos-wrapper">
    <h2 class="mis-pedidos-title">Mis pedidos</h2>
    <div id="pedidos-container" class="loading-box">Cargando pedidos...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar.js"></script>

  <script>
    Auth.requireAuth(["cliente"]);

    function formatearFecha(fecha) {
      if (!fecha) return "No disponible";
      return new Date(fecha).toLocaleString("es-HN");
    }

    function formatearEstado(estado) {
      if (!estado) return { texto: "No definido", clase: "estado-default" };

      const normalizado = estado.toString().trim().toLowerCase();

      if (normalizado.includes("pendiente")) {
        return { texto: estado, clase: "estado-pendiente" };
      }
      if (normalizado.includes("proceso")) {
        return { texto: estado, clase: "estado-en-proceso" };
      }
      if (normalizado.includes("enviado")) {
        return { texto: estado, clase: "estado-enviado" };
      }
      if (normalizado.includes("entregado")) {
        return { texto: estado, clase: "estado-entregado" };
      }
      if (normalizado.includes("cancelado")) {
        return { texto: estado, clase: "estado-cancelado" };
      }

      return { texto: estado, clase: "estado-default" };
    }

    function imagenProducto(producto) {
      const posibleImagen =
        producto?.imagen ||
        producto?.imagen_url ||
        producto?.foto ||
        producto?.url_imagen;

      if (posibleImagen) {
        const src = posibleImagen.startsWith("http")
          ? posibleImagen
          : ("http://localhost:3000" + posibleImagen);
        return `<img src="${src}" alt="${producto.nombre}" class="producto-img">`;
      }

      return `<div class="producto-placeholder">Sin imagen</div>`;
    }

    async function loadPedidos() {
      const container = document.getElementById("pedidos-container");
      container.className = "loading-box";
      container.innerHTML = "Cargando pedidos...";

      try {
        const pedidos = await API.getMisPedidos();

        if (!pedidos || pedidos.length === 0) {
          container.className = "empty-box";
          container.innerHTML = "<p class='mb-0'>No tienes pedidos aún.</p>";
          return;
        }

        let html = "";

        pedidos.forEach(pedido => {
          const detalles = pedido.PedidoDetalles || [];
          const estado = formatearEstado(pedido.estado);

          let productosHTML = "";

          detalles.forEach(det => {
            const p = det.Producto || {};
            const subtotal = Number(det.cantidad || 0) * Number(det.precio_unitario || 0);

            productosHTML += `
              <div class="producto-item">
                ${imagenProducto(p)}
                <div>
                  <div class="producto-nombre">${p.nombre || "Producto sin nombre"}</div>
                  <p class="producto-meta mb-0">
                    ${p.descripcion || "Sin descripción"}<br>
                    Cantidad: ${det.cantidad || 0}<br>
                    Precio unitario: L ${Number(det.precio_unitario || 0).toFixed(2)}
                  </p>
                </div>
                <div class="producto-precio">L ${subtotal.toFixed(2)}</div>
              </div>
            `;
          });

          html += `
            <div class="pedido-layout">
              <div class="row g-4">
                <div class="col-lg-7 pedido-left">
                  <div class="section-title">Información del pedido</div>

                  <div class="subsection-title">Datos generales</div>
                  <div class="info-grid">
                    <div class="info-item">
                      <span class="info-label">Número de pedido</span>
                      <div class="info-value">#${pedido.id}</div>
                    </div>

                    <div class="info-item">
                      <span class="info-label">Fecha</span>
                      <div class="info-value">${formatearFecha(pedido.createdAt)}</div>
                    </div>

                    <div class="info-item">
                      <span class="info-label">Método de pago</span>
                      <div class="info-value">${pedido.metodo_pago || "No especificado"}</div>
                    </div>

                    <div class="info-item">
                      <span class="info-label">Envío pagado</span>
                      <div class="info-value">${pedido.pago_envio ? "Sí" : "No"}</div>
                    </div>

                    <div class="info-item">
                      <span class="info-label">Estado</span>
                      <div class="info-value">
                        <span class="estado-badge ${estado.clase}">${estado.texto}</span>
                      </div>
                    </div>

                    <div class="info-item">
                      <span class="info-label">Productos</span>
                      <div class="info-value">${detalles.length}</div>
                    </div>

                  </div>
                </div>

                <div class="col-lg-5 pedido-right">
                  <div class="resumen-header">
                    <div class="section-title mb-0">Resumen del pedido</div>
                    <div class="resumen-count">(${detalles.length})</div>
                  </div>

                  ${productosHTML}

                  <div class="totales">
                    <div class="total-line">
                      <span>Envío</span>
                      <span>${pedido.pago_envio ? "Pagado" : "No incluido"}</span>
                    </div>

                    <div class="total-line">
                      <span>Método de pago</span>
                      <span>${pedido.metodo_pago || "No especificado"}</span>
                    </div>

                    <div class="total-final">
                      <span>Total:</span>
                      <span>L ${Number(pedido.total || 0).toFixed(2)}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        });

        container.className = "";
        container.innerHTML = html;

      } catch (err) {
        console.error(err);
        container.className = "error-box";
        container.innerHTML = "Error al cargar pedidos.";
      }
    }

    loadPedidos();
  </script>

</body>
</html>
