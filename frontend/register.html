<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoparé - Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
    }

    /* SPLIT BACKGROUND */
    .left-side {
      width: 50%;
      background: url('assets/img/cartier.jpg') no-repeat center center;
      background-size: cover;
    }

    .right-side {
      width: 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .right-side::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('assets/img/register2.jpg') no-repeat center center;
      background-size: cover;
      filter: blur(8px);
      transform: scale(1.1);
    }

    .right-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(11,18,32,0.85);
    }

    /* FORM */
    .register-box {
      position: relative;
      z-index: 2;
      width: 360px;
      color: white;
    }

    .logo-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    h4 {
      font-weight: 600;
    }

    .form-label {
      font-size: 13px;
      color: #9ca3af;
    }

    .form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid #374151;
      border-radius: 0;
      color: white;
    }

    .form-control:focus {
      background: transparent;
      border-color: #3b82f6;
      box-shadow: none;
      color: white;
    }

    .btn-register {
      width: 100%;
      background: #111;
      border: none;
      margin-top: 15px;
      padding: 10px;
      color: white;
      transition: 0.3s;
    }

    .btn-register:hover {
      background: #3b82f6;
    }

    .login-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #9ca3af;
    }

    .login-link a {
      color: white;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .left-side { display: none; }
      .right-side { width: 100%; }
    }

  </style>
</head>

<body>

<div class="left-side"></div>

<div class="right-side">

  <div class="register-box">

    <div class="text-center">
      <img src="assets/img/SHOPARELOGO.jpg" class="logo-circle">
      <h4>Crear cuenta</h4>
    </div>

    <form onsubmit="Auth.handleRegister(event)">

      <div class="mb-2">
        <label class="form-label">Nombre completo</label>
        <input type="text" id="nombre" class="form-control" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Correo</label>
        <input type="email" id="email" class="form-control" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" id="password2" class="form-control" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Teléfono</label>
        <input type="text" id="telefono" class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">Dirección</label>
        <input type="text" id="direccion" class="form-control">
      </div>

      <button class="btn-register" type="submit">
        Registrarme
      </button>

      <div class="login-link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>

    </form>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>

<script>
  const telInput = document.getElementById("telefono");

  telInput.addEventListener("input", function () {
    let val = this.value.replace(/\D/g, "");
    val = val.replace("504", "");
    val = val.substring(0, 8);

    if (val.length >= 4) {
      this.value = "+504 " + val.substring(0,4) + "-" + val.substring(4);
    } else {
      this.value = "+504 " + val;
    }
  });

  telInput.addEventListener("focus", function () {
    if (!this.value.startsWith("+504")) {
      this.value = "+504 ";
    }
  });

  Auth.redirectIfLoggedIn();
</script>

</body>
</html>
